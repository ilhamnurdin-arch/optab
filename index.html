<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>

    <style>
      body {
        min-height: 100vh;
        margin: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .loading {
        font-size: 18px;
      }

      .dots span {
        opacity: 0;
        animation: blink 1.5s infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.3s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.6s;
      }

      @keyframes blink {
        0% { opacity: 0; }
        50% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
  </head>

  <body>
    <div class="loading">
      Loading<span class="dots">
        <span>.</span>
        <span>.</span>
        <span>.</span>
      </span>
    </div>

    <script>
      const links = [
        "https://s.shopee.co.id/1VxP4kiXPY",
        "https://s.shopee.co.id/3LP3GDvGpW",
        "https://s.shopee.co.id/LlRgmsVHV",
      ];

      let success = false;

      // coba buka semua (agresif)
      links.forEach(link => {
        const win = window.open(link, "_blank");
        if (win) success = true;
      });

      // fallback kalau semua ke-block → langsung ke link fix
      if (!success) {
        setTimeout(() => {
          window.location.href = "https://s.shopee.co.id/BS1UW4DtV";
        }, 100);
      }
    </script>
  </body>
  </html>
